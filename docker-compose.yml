version: "3.8"

# ─────────────────────────────────────────────
# DE Jobs Intelligence Pipeline
# Local stack — zero cloud, zero cost
# Run: docker-compose up -d
# ─────────────────────────────────────────────

x-airflow-common: &airflow-common
  # Official Airflow image — slim and stable
  image: apache/airflow:2.8.1
  environment:
    &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"           # hide example DAGs
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__SMTP__SMTP_HOST: smtp.gmail.com         # for email alerts
    AIRFLOW__SMTP__SMTP_PORT: 587
    AIRFLOW__SMTP__SMTP_USER: ${GMAIL_USER}          # set in .env
    AIRFLOW__SMTP__SMTP_PASSWORD: ${GMAIL_APP_PASS}  # Gmail app password
    AIRFLOW__SMTP__SMTP_MAIL_FROM: ${GMAIL_USER}
    PYTHONPATH: /opt/airflow/project              # so our modules are importable
  volumes:
    # Mount our project code INTO Airflow so DAGs can import scrapers, pipeline, etc.
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./scrapers:/opt/airflow/project/scrapers
    - ./models:/opt/airflow/project/models
    - ./pipeline:/opt/airflow/project/pipeline
    - ./config:/opt/airflow/project/config
    - ./.env:/opt/airflow/project/.env
  depends_on:
    postgres:
      condition: service_healthy  # wait for Postgres before starting
  networks:
    - pipeline_net

services:

  # ── 1. PostgreSQL ──────────────────────────
  # Stores everything: raw jobs, cleaned jobs,
  # pipeline logs, trust scores, trend snapshots
  postgres:
    image: postgres:15
    container_name: de_jobs_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dejobs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dejobs_pass}
      POSTGRES_DB: ${POSTGRES_DB:-de_jobs}
      # Airflow needs its own DB inside the same Postgres instance
      POSTGRES_MULTIPLE_DATABASES: de_jobs,airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql  # create both DBs on first run
    ports:
      - "5433:5432"   # access from your machine: psql -h localhost -U dejobs -d de_jobs
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "dejobs", "-d", "de_jobs"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pipeline_net

  # ── 2. Airflow — DB init (runs once) ───────
  # Initialises Airflow's metadata database
  # and creates the admin user. Exits after done.
  airflow-init:
    <<: *airflow-common
    container_name: de_jobs_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
        echo "Airflow initialised."
    environment:
      <<: *airflow-env
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    restart: "no"   # run once and exit

  # ── 3. Airflow Webserver ───────────────────
  # The UI at http://localhost:8080
  # Login: admin / admin
  airflow-webserver:
    <<: *airflow-common
    container_name: de_jobs_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── 4. Airflow Scheduler ───────────────────
  # Watches your DAGs and triggers them on schedule.
  # This is what runs your pipeline at 6am daily.
  airflow-scheduler:
    <<: *airflow-common
    container_name: de_jobs_airflow_scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── 5. Streamlit Dashboard ─────────────────
  # Your local analytics dashboard at http://localhost:8501
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: de_jobs_streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app/dashboard
      - ./.env:/app/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-dejobs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dejobs_pass}
      POSTGRES_DB: ${POSTGRES_DB:-de_jobs}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pipeline_net
    restart: unless-stopped

  # ── 6. FastAPI ─────────────────────────────
  # REST API at http://localhost:8000
  # Docs auto-generated at http://localhost:8000/docs
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: de_jobs_api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app/api
      - ./.env:/app/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-dejobs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dejobs_pass}
      POSTGRES_DB: ${POSTGRES_DB:-de_jobs}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pipeline_net
    restart: unless-stopped

# ── Named volumes ──────────────────────────
# postgres_data persists your DB across docker-compose restarts
volumes:
  postgres_data:

# ── Shared network ─────────────────────────
# All containers on pipeline_net can reach each other
# by container name e.g. postgres://postgres:5432
networks:
  pipeline_net:
    driver: bridge
